<app-map-explorer></app-map-explorer>

@if (reportService.currentReport(); as report) {
  <app-report-viewer 
    [report]="report" 
    (close)="reportService.clearReport()">

}

@if (reportService.isReportsPanelOpen()) {
  <app-reports-panel></app-reports-panel>
}

<header class="top-bar">
  <div class="brand">
    <img src="/assets/logo_without_text_small.png" alt="GeoAura Logo" class="logo-img">
    <h1 class="app-name">
      Geo<span class="aura">
        <span class="a">A</span><span class="u">U</span><span class="r">R</span><span class="a2">A</span>
      </span>
      <span class="nz">NZ</span>
      <span class="expansion">
        <span class="a">Agentic</span>
        <span class="u">Urban</span>
        <span class="r">Risk</span>
        <span class="a2">Analysis</span>
      </span>
    </h1>
  </div>

  <div class="actions">
    @if (authService.isLoggedIn()) {
      <button class="reports-nav-btn" (click)="toggleReportsPanel()" title="Aura Reports">
        <span class="material-symbols-outlined">analytics</span>
        <span class="btn-label">Reports</span>
        @if (reportService.isAnyReportProcessing()) {
          <span class="report-badge"></span>
        }
      </button>
    }

    @if (authService.loading()) {
      <div class="avatar-skeleton"></div>
    } @else if (authService.isLoggedIn()) {
      <div class="user-menu-wrapper">
        <button
          id="user-menu-btn"
          class="user-avatar-btn"
          (click)="toggleUserMenu()"
          [attr.aria-expanded]="showUserMenu()"
          aria-haspopup="true"
        >
          @if (authService.user()?.avatarUrl) {
            <img
              [src]="authService.user()!.avatarUrl!"
              [alt]="authService.user()!.name ?? 'User'"
              class="avatar-img"
              referrerpolicy="no-referrer"
            />
          } @else {
            <div class="avatar-initials">
              {{ (authService.user()?.name ?? authService.user()?.email ?? 'U')[0].toUpperCase() }}
            </div>
          }
          <span class="material-symbols-outlined chevron" [class.open]="showUserMenu()">expand_more</span>
        </button>

        @if (showUserMenu()) {
          <div class="user-dropdown">
            <div class="dropdown-user-info">
              <span class="dropdown-name">{{ authService.user()?.name ?? 'User' }}</span>
              <span class="dropdown-email">{{ authService.user()?.email }}</span>
            </div>
            <div class="dropdown-divider"></div>
            <button id="signout-btn" class="dropdown-item danger" (click)="signOut()">
              <span class="material-symbols-outlined">logout</span>
              Sign out
            </button>
          </div>
        }
      </div>
    } @else {
      <button id="signin-btn" class="signin-btn" (click)="openAuthModal()">
        <span class="material-symbols-outlined">login</span>
        Sign in
      </button>
    }
  </div>
</header>

@if (authService.showAuthModal()) {
  <app-auth-modal (close)="closeAuthModal()" />
}
